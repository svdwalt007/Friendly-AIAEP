version: '3.8'

services:
  # PostgreSQL database for agent state persistence
  postgres:
    image: postgres:15-alpine
    container_name: aep-agent-postgres
    environment:
      POSTGRES_DB: aep_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      # Persist data
      - postgres_data:/var/lib/postgresql/data
      # Optional: Auto-run migration on startup
      # - ./migrations/001_create_checkpoints_table.sql:/docker-entrypoint-initdb.d/001_create_checkpoints_table.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aep_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - aep-network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aep-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@friendly.ai
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aep-network

  # Optional: Redis for caching (if needed)
  # redis:
  #   image: redis:7-alpine
  #   container_name: aep-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5
  #   restart: unless-stopped
  #   networks:
  #     - aep-network

volumes:
  postgres_data:
    name: aep_postgres_data
  pgadmin_data:
    name: aep_pgadmin_data
  # redis_data:
  #   name: aep_redis_data

networks:
  aep-network:
    name: aep-network
    driver: bridge
