# Friendly AI AEP Pre-Production Environment
# This docker-compose file sets up the pre-production infrastructure

services:
  # API Gateway
  aep-api-gateway:
    image: ghcr.io/svdwalt007/friendly-aiaep/aep-api-gateway:preprod
    container_name: friendly-aep-preprod-api-gateway
    restart: always
    environment:
      NODE_ENV: production
      DEPLOYMENT_MODE: preprod
      HOST: '0.0.0.0'
      PORT: '3001'
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      INFLUXDB_URL: ${INFLUXDB_URL:-http://influxdb:8086}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-friendly}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-iot_data}
      LOG_LEVEL: info
      LOG_FORMAT: json
      AUDIT_ENABLED: 'true'
      RATE_LIMIT_ENABLED: 'true'
      CORS_ORIGIN: ${CORS_ORIGIN}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: preprod
    ports:
      - '46000:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

  # Builder Application
  aep-builder:
    image: ghcr.io/svdwalt007/friendly-aiaep/aep-builder:preprod
    container_name: friendly-aep-preprod-builder
    restart: always
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - aep-api-gateway
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Preview Host
  aep-preview-host:
    image: ghcr.io/svdwalt007/friendly-aiaep/aep-preview-host:preprod
    container_name: friendly-aep-preprod-preview-host
    restart: always
    environment:
      NODE_ENV: production
      DEPLOYMENT_MODE: preprod
      HOST: '0.0.0.0'
      PORT: '3002'
      LOG_LEVEL: info
    ports:
      - '46001:3002'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - aep-api-gateway
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.75'
        reservations:
          memory: 384M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: friendly-aep-preprod-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - '46100:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=2621kB
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

  # InfluxDB
  influxdb:
    image: influxdb:2.7-alpine
    container_name: friendly-aep-preprod-influxdb
    restart: always
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    ports:
      - '46101:8086'
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ['CMD', 'influx', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

  # Telegraf
  telegraf:
    image: telegraf:1.31-alpine
    container_name: friendly-aep-preprod-telegraf
    restart: always
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      INFLUX_URL: http://friendly-aep-preprod-influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_TOKEN}
      INFLUX_ORG: ${INFLUXDB_ORG}
      INFLUX_BUCKET: ${INFLUXDB_BUCKET}
    ports:
      - '46472:8125/udp'
      - '46471:8092/udp'
      - '46470:8094'
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Grafana
  grafana:
    image: grafana/grafana:11.3.0
    container_name: friendly-aep-preprod-grafana
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: ${POSTGRES_DB}
      GF_DATABASE_USER: ${POSTGRES_USER}
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-grafana-preprod.friendly-aep.example.com}
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      GF_LOG_MODE: console
      GF_LOG_LEVEL: info
      # Datasource provisioning environment variables
      GRAFANA_INFLUXDB_URL: http://friendly-aep-preprod-influxdb:8086
      GRAFANA_INFLUXDB_ORG: ${INFLUXDB_ORG}
      GRAFANA_INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      GRAFANA_INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      GRAFANA_POSTGRES_URL: friendly-aep-preprod-postgres:5432
      GRAFANA_POSTGRES_USER: ${POSTGRES_USER}
      GRAFANA_POSTGRES_DB: ${POSTGRES_DB}
      GRAFANA_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '45001:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
        reservations:
          memory: 384M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

  # Redis
  redis:
    image: redis:7-alpine
    container_name: friendly-aep-preprod-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - '46102:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # MinIO (if not using AWS S3)
  minio:
    image: minio/minio:latest
    container_name: friendly-aep-preprod-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER: 'on'
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - '46200:9000'
      - '45003:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: friendly-aep-preprod-network
    driver: bridge
