# Telegraf Configuration for Friendly AI AEP
# IoT Data Ingestion and Metrics Collection

[global_tags]
  environment = "development"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

# Output to InfluxDB 2.x
[[outputs.influxdb_v2]]
  urls = ["${INFLUX_URL}"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"
  timeout = "5s"

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

# Collect metrics from Telegraf itself
[[inputs.internal]]
  collect_memstats = true

# StatsD Server - for custom metrics
[[inputs.statsd]]
  protocol = "udp"
  service_address = ":8125"
  delete_gauges = true
  delete_counters = true
  delete_sets = true
  delete_timings = true
  percentiles = [50.0, 90.0, 99.0, 99.9, 99.95, 100.0]
  metric_separator = "_"

# HTTP Listener - for webhook-based IoT data
[[inputs.http_listener_v2]]
  service_address = ":8094"
  paths = ["/telegraf"]
  methods = ["POST", "PUT"]
  data_format = "json"

# UDP Listener - for lightweight IoT device telemetry
[[inputs.socket_listener]]
  service_address = "udp://:8092"
  data_format = "json"

# CPU Metrics (for platform monitoring)
[[inputs.cpu]]
  percpu = true
  totalcpu = true

# Memory Metrics (for platform monitoring)
[[inputs.mem]]

# Disk Metrics (for platform monitoring)
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]
