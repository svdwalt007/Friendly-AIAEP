# ============================================================================
# Loki Log Aggregation Configuration
# ============================================================================
# Loki is a log aggregation system inspired by Prometheus
# Used for storing and querying application logs
# ============================================================================

# Authentication disabled for development
auth_enabled: false

# Server configuration
server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

# Ingester configuration (writes logs to storage)
ingester:
  # Lifecycle configuration
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s

  # Chunk configuration
  chunk_idle_period: 5m
  chunk_retain_period: 30s

  # WAL configuration (Write-Ahead Log)
  wal:
    enabled: true
    dir: /loki/wal

# Schema configuration
schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

# Storage configuration
storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    cache_location: /loki/boltdb-shipper-cache
    cache_ttl: 24h

  filesystem:
    directory: /loki/chunks

# Compactor configuration (for log retention and cleanup)
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

# Limits configuration
limits_config:
  # Ingestion limits
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20

  # Query limits
  max_query_length: 721h  # 30 days
  max_query_parallelism: 32
  max_streams_per_user: 10000
  max_global_streams_per_user: 0

  # Retention (how long to keep logs)
  retention_period: 744h  # 31 days

  # Chunk limits
  max_chunks_per_query: 2000000
  max_query_series: 500

  # Disable structured metadata for legacy schema (v11/boltdb-shipper)
  allow_structured_metadata: false

# Table manager configuration
table_manager:
  retention_deletes_enabled: true
  retention_period: 744h  # 31 days

# Ruler configuration (for alerts - optional)
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true

# Query range configuration
query_range:
  # Cache configuration
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 1024
        ttl: 24h

  # Parallelization
  parallelise_shardable_queries: true
  max_retries: 5

# Frontend configuration
frontend:
  log_queries_longer_than: 5s
  compress_responses: true
  max_outstanding_per_tenant: 2048

# Query scheduler configuration
query_scheduler:
  max_outstanding_requests_per_tenant: 2048

# Analytics
analytics:
  reporting_enabled: false
