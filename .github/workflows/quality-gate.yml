# Quality Gate — Vitest coverage threshold enforcement for Friendly-AIAEP.
#
# Runs `nx affected -t test --coverage` on every PR and push to main/develop,
# then walks every `coverage-summary.json` produced by the v8 reporter and
# fails the build if any project drops below the workspace target.
#
# Thresholds live in `tools/vitest/coverage-thresholds.ts` (single source of
# truth shared with the per-project vitest configs). Override them per-project
# in the corresponding `vitest.config.mts` if you have a documented reason.

name: Quality Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  # Transitional floors — must match COVERAGE_FLOOR in
  # tools/vitest/coverage-thresholds.ts. See that file for the ratchet plan
  # back to the 80/75/80/80 target.
  MIN_LINE_COVERAGE: 70
  MIN_BRANCH_COVERAGE: 60
  MIN_FUNCTION_COVERAGE: 65
  MIN_STATEMENT_COVERAGE: 70

jobs:
  forbidden-patterns:
    name: Gate 1 · Forbidden patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan source for prohibited markers
        run: |
          set -euo pipefail
          FAIL=0
          PATTERNS=(
            "NOCOMMIT"
            "DO NOT SUBMIT"
            "<<<<<<<"
            ">>>>>>>"
          )
          for pat in "${PATTERNS[@]}"; do
            if git grep -nE "$pat" -- 'apps/**/*.ts' 'apps/**/*.tsx' 'libs/**/*.ts' 'libs/**/*.tsx' 2>/dev/null; then
              echo "::error::Forbidden pattern '$pat' present in source"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] || exit 1
          echo "Grep gate passed."

  coverage:
    name: Gate 2 · Vitest coverage thresholds
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: friendly
          POSTGRES_PASSWORD: friendly_test_password
          POSTGRES_DB: friendly_aep_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U friendly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://friendly:friendly_test_password@localhost:5432/friendly_aep_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from package.json `packageManager` to avoid the
        # ERR_PNPM_BAD_PM_VERSION conflict that fires when both are pinned.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive Nx affected SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Run affected tests with coverage
        run: pnpm nx affected -t test --parallel=3 --coverage --reporter=verbose
        env:
          CI: true

      - name: Enforce per-project coverage thresholds
        run: node tools/vitest/check-coverage.mjs
        env:
          MIN_LINE_COVERAGE: ${{ env.MIN_LINE_COVERAGE }}
          MIN_BRANCH_COVERAGE: ${{ env.MIN_BRANCH_COVERAGE }}
          MIN_FUNCTION_COVERAGE: ${{ env.MIN_FUNCTION_COVERAGE }}
          MIN_STATEMENT_COVERAGE: ${{ env.MIN_STATEMENT_COVERAGE }}

      - name: Publish aggregated coverage summary
        if: always()
        run: |
          if [ -f coverage/aggregate-summary.md ]; then
            cat coverage/aggregate-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-coverage
          path: |
            coverage/
          retention-days: 14
          if-no-files-found: ignore

  gate-success:
    name: Quality Gate · Success
    needs: [forbidden-patterns, coverage]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summarize
        run: |
          echo "## Quality Gate Result" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Forbidden patterns | ${{ needs.forbidden-patterns.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Coverage thresholds | ${{ needs.coverage.result }} |" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ needs.forbidden-patterns.result }}" != "success" || "${{ needs.coverage.result }}" != "success" ]]; then
            echo "::error::One or more quality gates failed."
            exit 1
          fi
