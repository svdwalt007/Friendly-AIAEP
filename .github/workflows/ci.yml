name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        type: string
        default: 'dev'
      skip_e2e:
        description: 'Skip E2E tests'
        type: boolean
        default: false
    outputs:
      build_success:
        description: 'Build success status'
        value: ${{ jobs.ci-success.outputs.success }}
      artifact_version:
        description: 'Build artifact version'
        value: ${{ jobs.build.outputs.version }}
    secrets:
      NX_CLOUD_ACCESS_TOKEN:
        required: false
      CODECOV_TOKEN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  ENVIRONMENT: ${{ inputs.environment || 'dev' }}

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      node-versions: ${{ steps.set-matrix.outputs.node-versions }}
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "node-versions=[\"20\"]" >> $GITHUB_OUTPUT
          else
            echo "node-versions=[\"20\", \"22\"]" >> $GITHUB_OUTPUT
          fi

      - name: Set environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=test" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJson(needs.setup.outputs.node-versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from package.json `packageManager` to avoid the
        # ERR_PNPM_BAD_PM_VERSION conflict that fires when both are pinned.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: |
            .nx/cache
            node_modules/.cache/nx
          key: ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('nx.json', 'apps/**/project.json', 'libs/**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4

      - name: Run ESLint on affected projects
        run: pnpm nx affected -t lint --parallel=3 --configuration=${{ env.ENVIRONMENT }}

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-node-${{ matrix.node-version }}
          path: |
            **/eslint-report.json
            **/eslint-report.html
          retention-days: 7
          if-no-files-found: ignore

  typecheck:
    name: Type Check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJson(needs.setup.outputs.node-versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from package.json `packageManager` to avoid the
        # ERR_PNPM_BAD_PM_VERSION conflict that fires when both are pinned.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: |
            .nx/cache
            node_modules/.cache/nx
          key: ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('nx.json', 'apps/**/project.json', 'libs/**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4

      - name: Run TypeScript type checking on affected projects
        run: pnpm nx affected -t build --parallel=3 --configuration=${{ env.ENVIRONMENT }}

  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJson(needs.setup.outputs.node-versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from package.json `packageManager` to avoid the
        # ERR_PNPM_BAD_PM_VERSION conflict that fires when both are pinned.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: |
            .nx/cache
            node_modules/.cache/nx
          key: ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('nx.json', 'apps/**/project.json', 'libs/**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4

      - name: Generate build version
        id: version
        run: |
          VERSION="${{ github.sha }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Build version: ${VERSION}"

      - name: Build affected projects
        run: pnpm nx affected -t build --parallel=3 --configuration=${{ env.ENVIRONMENT }}
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}

      - name: Analyze bundle size
        if: matrix.node-version == '20'
        run: |
          echo "## Bundle Size Analysis" >> $GITHUB_STEP_SUMMARY
          if [ -d "dist" ]; then
            find dist -name "*.js" -type f -exec du -h {} \; | sort -h -r | head -20 >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload build artifacts
        if: matrix.node-version == '20'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: |
            dist/
            !dist/**/*.map
          retention-days: 7
          compression-level: 9

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJson(needs.setup.outputs.node-versions) }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: friendly
          POSTGRES_PASSWORD: friendly_test_password
          POSTGRES_DB: friendly_aep_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U friendly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://friendly:friendly_test_password@localhost:5432/friendly_aep_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from package.json `packageManager` to avoid the
        # ERR_PNPM_BAD_PM_VERSION conflict that fires when both are pinned.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: |
            .nx/cache
            node_modules/.cache/nx
          key: ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('nx.json', 'apps/**/project.json', 'libs/**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4

      - name: Run database migrations
        run: |
          cd libs/data/prisma-schema
          pnpm exec prisma migrate deploy
          pnpm exec prisma db seed

      - name: Run tests on affected projects
        run: pnpm nx affected -t test --parallel=3 --coverage --codeCoverage
        env:
          CI: true

      - name: Generate test report
        if: always()
        run: |
          echo "## Test Results (Node ${{ matrix.node-version }})" >> $GITHUB_STEP_SUMMARY
          if [ -d "coverage" ]; then
            echo "Coverage reports generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20' && always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/**/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: ${{ !inputs.skip_e2e }}
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: friendly
          POSTGRES_PASSWORD: friendly_e2e_password
          POSTGRES_DB: friendly_aep_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U friendly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://friendly:friendly_e2e_password@localhost:5432/friendly_aep_e2e
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from package.json `packageManager` to avoid the
        # ERR_PNPM_BAD_PM_VERSION conflict that fires when both are pinned.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: dist/

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4

      - name: Run database migrations
        run: |
          cd libs/data/prisma-schema
          pnpm exec prisma migrate deploy
          pnpm exec prisma db seed

      - name: Run E2E tests on affected projects
        run: pnpm nx affected -t e2e --parallel=1
        env:
          CI: true

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Upload E2E screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: |
            test-results/**/*.png
            playwright-report/**/*.png
          retention-days: 7
          if-no-files-found: ignore

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from package.json `packageManager` to avoid the
        # ERR_PNPM_BAD_PM_VERSION conflict that fires when both are pinned.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        continue-on-error: true
        run: |
          pnpm audit --audit-level=moderate --json > audit-results.json
          echo "## NPM Audit Results" >> $GITHUB_STEP_SUMMARY
          pnpm audit --audit-level=moderate >> $GITHUB_STEP_SUMMARY || true

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: audit-results.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret,config'

      - name: Upload Trivy filesystem results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

      - name: Run Trivy configuration scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: 'codeql-analysis'

      - name: OSSF Scorecard
        uses: ossf/scorecard-action@v2
        with:
          results_file: ossf-scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload OSSF Scorecard results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ossf-scorecard-results.sarif
          category: 'ossf-scorecard'

  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: github.event_name == 'pull_request'
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: friendly
          POSTGRES_PASSWORD: friendly_visual_password
          POSTGRES_DB: friendly_aep_visual
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U friendly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://friendly:friendly_visual_password@localhost:5432/friendly_aep_visual
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NODE_ENV: test
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from package.json `packageManager` to avoid the
        # ERR_PNPM_BAD_PM_VERSION conflict that fires when both are pinned.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: dist/

      - name: Run Percy visual regression
        if: env.PERCY_TOKEN != ''
        run: pnpm test:visual
        env:
          CI: true

      - name: Run local visual snapshots (no Percy)
        if: env.PERCY_TOKEN == ''
        run: pnpm test:visual:local
        env:
          CI: true

      - name: Upload visual diff results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build, test, security]
    if: always()
    outputs:
      success: ${{ steps.check.outputs.success }}

    steps:
      - name: Check all jobs status
        id: check
        run: |
          echo "## CI Job Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "success=false" >> $GITHUB_OUTPUT
            echo "## CI Failed" >> $GITHUB_STEP_SUMMARY
            echo "One or more required jobs failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "success=true" >> $GITHUB_OUTPUT
          echo "## CI Passed" >> $GITHUB_STEP_SUMMARY
          echo "All required jobs passed successfully" >> $GITHUB_STEP_SUMMARY

      - name: Send Slack notification
        if: always() && secrets.SLACK_WEBHOOK_URL
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "CI Pipeline ${{ steps.check.outputs.success == 'true' && 'Succeeded' || 'Failed' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*CI Pipeline ${{ steps.check.outputs.success == 'true' && ':white_check_mark:' || ':x:' }}*\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
