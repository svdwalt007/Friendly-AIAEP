<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<title>Three-API authentication flow via auth-adapter</title>
<desc>Auth-adapter handles Basic Auth for Northbound, JWT exchange for Events, API Key for QoE, with OAuth2 stub.</desc>
<rect width="680" height="580" fill="white"/>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="220" y="16" width="240" height="36" rx="8" fill="#f5f5f0" stroke="#c8c7c2" stroke-width="0.5" stroke-dasharray="4 3"/><text x="340" y="34" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="14" font-weight="500" fill="#1a1a1a">API request from agent / proxy</text>
<line x1="340" y1="52" x2="340" y2="76" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="140" y="76" width="400" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="340" y="96" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="14" font-weight="500" fill="#0C447C">auth-adapter (credential manager)</text><text x="340" y="114" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#185FA5">Tenant creds from Vault · Token cache in Redis</text>
<line x1="160" y1="132" x2="110" y2="178" stroke="#73726c" stroke-width="0.5" marker-end="url(#arrow)"/><line x1="340" y1="132" x2="340" y2="178" stroke="#73726c" stroke-width="0.5" marker-end="url(#arrow)"/><line x1="520" y1="132" x2="570" y2="178" stroke="#73726c" stroke-width="0.5" marker-end="url(#arrow)"/>
<rect x="40" y="178" width="180" height="108" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="130" y="198" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="14" font-weight="500" fill="#085041">Northbound REST</text>
<text x="130" y="220" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#0F6E56">Device management</text>
<text x="130" y="240" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#0F6E56">Provisioning, FW, LwM2M</text>
<text x="130" y="264" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#0F6E56">Auth: Basic + API Key</text>
<rect x="250" y="178" width="180" height="108" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="198" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="14" font-weight="500" fill="#3C3489">Events / Webhook REST</text>
<text x="340" y="220" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#534AB7">Real-time subscriptions</text>
<text x="340" y="240" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#534AB7">Webhook registration</text>
<text x="340" y="264" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#534AB7">Auth: JWT + API Key</text>
<rect x="460" y="178" width="180" height="108" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="550" y="198" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="14" font-weight="500" fill="#712B13">QoE / Monitoring REST</text>
<text x="550" y="220" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#993C1D">Time-series KPIs</text>
<text x="550" y="240" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#993C1D">Connectivity stats</text>
<text x="550" y="264" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#993C1D">Auth: Basic + API Key</text>
<line x1="130" y1="286" x2="130" y2="326" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="340" y1="286" x2="340" y2="326" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="550" y1="286" x2="550" y2="326" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="130" y="312" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#73726c">Authorization: Basic</text>
<text x="340" y="312" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#73726c">POST /auth/login</text>
<text x="550" y="312" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#73726c">X-API-Key header</text>
<rect x="60" y="326" width="140" height="36" rx="5" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text x="130" y="344" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#085041">Base64(UID:PW)</text>
<rect x="270" y="326" width="140" height="36" rx="5" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text x="340" y="344" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#3C3489">UID/PW → JWT token</text>
<rect x="480" y="326" width="140" height="36" rx="5" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text x="550" y="344" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#712B13">Static API key</text>
<line x1="340" y1="362" x2="340" y2="396" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="340" y="386" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#73726c">Cache in Redis</text>
<rect x="270" y="396" width="140" height="36" rx="5" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text x="340" y="414" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#3C3489">Bearer {JWT}</text>
<line x1="340" y1="432" x2="340" y2="462" stroke="#73726c" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="340" y="454" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#73726c">Auto-refresh before expiry</text>
<line x1="40" y1="480" x2="640" y2="480" stroke="#c8c7c2" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>
<text x="340" y="500" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#73726c">Future OAuth2 (when Friendly DM supports it)</text>
<rect x="140" y="514" width="400" height="50" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="532" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="14" font-weight="500" fill="#444441">OAuth2 adapter (stub — Phase 2+)</text>
<text x="340" y="548" text-anchor="middle" dominant-baseline="central" font-family="Calibri,sans-serif" font-size="12" fill="#5F5E5A">client_credentials + authorization_code grants</text>
</svg>