{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    app: {{ .Release.Name }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-api-gateway
                port:
                  number: {{ $.Values.apiGateway.port }}
          - path: /preview
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-preview-host
                port:
                  number: {{ $.Values.previewHost.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-builder
                port:
                  number: {{ $.Values.builder.port }}
    {{- end }}
{{- end }}
