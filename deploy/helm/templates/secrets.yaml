apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
  jwt-secret: "{{ required "JWT secret is required" .Values.jwtSecret | default "" }}"
  database-url: "{{ .Values.databaseUrl | default "" }}"
  anthropic-api-key: "{{ .Values.anthropicApiKey | default "" }}"
  influxdb-token: "{{ .Values.influxdbToken | default "" }}"
