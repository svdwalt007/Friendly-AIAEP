apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-preview-host
  labels:
    app: {{ .Release.Name }}
    component: preview-host
spec:
  replicas: {{ .Values.previewHost.replicaCount | default .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
      component: preview-host
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        component: preview-host
    spec:
      containers:
        - name: preview-host
          image: "{{ .Values.image.registry }}/aep-preview-host:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.previewHost.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.environment }}
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "{{ .Values.previewHost.port }}"
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.previewHost.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.previewHost.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-preview-host
spec:
  selector:
    app: {{ .Release.Name }}
    component: preview-host
  ports:
    - port: {{ .Values.previewHost.port }}
      targetPort: {{ .Values.previewHost.port }}
      protocol: TCP
