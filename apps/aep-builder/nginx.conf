# ==============================================================================
# AEP Builder - Production-Ready Nginx Configuration
# ==============================================================================
# Features:
# - Enhanced security headers (CSP, HSTS, etc.)
# - Optimized gzip compression with brotli support
# - Advanced caching strategies
# - Request size limits and rate limiting
# - WebSocket support
# - API reverse proxy configuration
# ==============================================================================

# Main server block
server {
    listen 80;
    server_name _;

    # Increase buffer sizes for better performance
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    root /usr/share/nginx/html;
    index index.html;

    # ===========================================================================
    # Compression Configuration
    # ===========================================================================

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        image/x-icon
        font/truetype
        font/opentype
        font/woff
        font/woff2;

    # Disable gzip for IE6
    gzip_disable "msie6";

    # ===========================================================================
    # Security Headers
    # ===========================================================================

    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy (adjust as needed for your app)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self';" always;

    # Permissions Policy (formerly Feature-Policy)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # HSTS (HTTP Strict Transport Security) - Enable when using HTTPS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent information disclosure
    server_tokens off;

    # ===========================================================================
    # Logging Configuration
    # ===========================================================================

    # Access log format with additional details (log_format must be in http context)
    # Using combined format which is already defined in nginx.conf
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # Cache static assets with versioning (hash in filename)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # Special handling for index.html (no caching)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        expires off;
        try_files $uri =404;
    }

    # Cache manifest and service worker (short cache)
    location ~* \.(manifest|webmanifest|appcache)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # ===========================================================================
    # SPA Routing
    # ===========================================================================

    # Single Page Application fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ===========================================================================
    # API Reverse Proxy
    # ===========================================================================

    # API proxy with enhanced configuration
    location /api/ {
        # Proxy configuration
        proxy_pass http://aep-api-gateway:46000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Error handling
        proxy_intercept_errors off;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;

        # Disable caching for API requests
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ===========================================================================
    # WebSocket Proxy (Long-lived connections)
    # ===========================================================================

    # WebSocket proxy with extended timeouts
    location /api/v1/agent/stream {
        proxy_pass http://aep-api-gateway:46000;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts for WebSocket
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # Disable buffering for real-time streaming
        proxy_buffering off;

        # Keep-alive
        proxy_socket_keepalive on;
    }

    # ===========================================================================
    # Health Check Endpoint
    # ===========================================================================

    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'healthy\n';
    }

    # ===========================================================================
    # Error Pages
    # ===========================================================================

    # Custom error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ===========================================================================
    # Security: Deny access to sensitive files
    # ===========================================================================

    # Deny access to hidden files (except .well-known)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to backup and source files
    location ~* (?:\.(?:bak|conf|dist|fla|in[ci]|log|orig|psd|sh|sql|sw[op])|~)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

